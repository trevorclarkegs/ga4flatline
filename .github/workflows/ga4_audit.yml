name: GA4 Event Audit

on:
  workflow_dispatch:
  schedule:
    - cron: '0 13 * * 1'  # Every Monday at 9am ET (13:00 UTC)

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install gspread google-analytics-data google-auth-oauthlib google-auth requests

      - name: Write credentials
        run: |
          echo '${{ secrets.SERVICE_ACCOUNT_JSON }}' > service_account.json
          echo '${{ secrets.GA4_TOKEN }}' > token_ga4.json
          echo '${{ secrets.WRIKE_CONFIG }}' > wrike_config.json

      - name: Run GA4 audit
        run: python ga4_days_since_event_sheets.py --sheet-service-account service_account.json
